# CRISIS-BENCH: Production overrides for Oracle Cloud Always Free
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# OCI Always Free resources: 4 ARM64 cores, 24 GB RAM, 200 GB storage
# Total memory budget: ~13 GB for services (leave ~11 GB for OS + Ollama)

services:
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    environment:
      - POSTGRES_USER=crisis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=crisis_bench
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    command: >
      redis-server
      --appendonly yes
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}

  neo4j:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512M

  chromadb:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  langfuse:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  prometheus:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  grafana:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_HTTP_PORT=3000
      - GF_SERVER_ROOT_URL=http://${SERVER_DOMAIN:-localhost}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: crisis-api
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=crisis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=crisis_bench
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LANGFUSE_HOST=http://langfuse:3000
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - crisis-net

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    environment:
      - NEXT_PUBLIC_API_URL=http://${SERVER_DOMAIN:-localhost}/api
    networks:
      - crisis-net

  nginx:
    image: nginx:alpine
    container_name: crisis-nginx
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - crisis-net
